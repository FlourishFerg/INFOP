version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: infopouch_postgres
    environment:
      POSTGRES_DB: infopouch_dev
      POSTGRES_USER: infopouch_admin
      POSTGRES_PASSWORD: secure_dev_password_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infopouch_admin -d infopouch_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: infopouch_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
